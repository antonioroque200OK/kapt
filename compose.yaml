services:
  # Database local para desenvolvimento e testes geoespaciais
  db:
    image: postgis/postgis:15-3.3
    container_name: kapt_db_dev
    environment:
      POSTGRES_USER: kapt_admin
      POSTGRES_PASSWORD: kapt_password
      POSTGRES_DB: kapt_local
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Instância local do n8n para prototipar fluxos de notificação
  n8n:
    image: n8nio/n8n:latest
    container_name: kapt_n8n_dev
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=kapt_n8n_pass
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  postgres_data:
  n8n_data: