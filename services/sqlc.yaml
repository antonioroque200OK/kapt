version: "2"
sql:
  - schema: "sqlc/migration/"
    queries: "sqlc/query/"
    engine: "postgresql"
    gen:
      go:
        package: "repository"
        # Points exactly to the repository folder inside internal
        out: "internal/repository"
        emit_json_tags: true
        emit_interface: true
        overrides:
          - column: "occurrences.location_geom"
            go_type: "string"
